name: CI — PhishGuard Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          VT_API_KEY: ""    # CI runs in ML-only mode

      - name: Test API health endpoint
        run: |
          cd backend
          python -c "
          from ml_detector import PhishingDetector
          d = PhishingDetector()
          d.train_or_load()
          result = d.predict('http://paypa1-secure-login.xyz/verify')
          assert result['phishing_probability'] > 0.5, 'ML detection failed'
          print('✅ ML detector working, prob:', result['phishing_probability'])
          "
